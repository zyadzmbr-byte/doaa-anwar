    <style>
        .huge-hero {
            position: relative;
            padding: 160px 20px 80px;
            background: radial-gradient(circle at center top, rgba(18, 184, 197, 0.1) 0%, rgba(255, 255, 255, 0) 70%);
            border-bottom: 2px solid #f1f6fa;
            text-align: center;
            overflow: hidden;
            z-index: 1;
        }

        .huge-hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="2" fill="%2312b8c5" opacity="0.1"/></pattern></defs><rect width="100%" height="100%" fill="url(%23dots)"/></svg>');
            z-index: -1;
        }

        .hero-title-box h1 {
            font-size: 68px;
            font-weight: 900;
            line-height: 1.2;
            color: var(--text-dark);
            margin-bottom: 20px;
        }

        .hero-title-box h1.highlight {
            background: linear-gradient(90deg, var(--primary-color), #00d2ff);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 78px;
            letter-spacing: -2px;
        }

        .large-stats-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 60px 0;
            flex-wrap: wrap;
        }

        .large-stat {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            padding: 40px 60px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 1);
            text-align: center;
            min-width: 250px;
        }

        .large-stat:hover {
            transform: translateY(-20px);
            box-shadow: 0 35px 60px rgba(18, 184, 197, 0.2);
        }

        .large-stat h3 {
            font-size: 44px;
            color: var(--primary-color);
            font-weight: 900;
            margin-bottom: 5px;
        }

        .large-stat p {
            font-size: 22px;
            color: #6a7c92;
            font-weight: bold;
        }

        .huge-illustration {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            animation: float 6s ease-in-out infinite;
            filter: drop-shadow(0 30px 30px rgba(0, 0, 0, 0.1));
            display: block;
        }

        .section-split.large-split {
            padding: 100px 20px;
            gap: 60px;
        }

        .section-split.large-split h2 {
            font-size: 52px;
            line-height: 1.3;
        }

        .section-split.large-split p {
            font-size: 24px;
            margin-top: 20px;
        }

        .country-dropdown a {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 16px;
        }

        .country-dropdown img {
            border-radius: 50%;
            width: 24px;
            height: 24px;
            object-fit: cover;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            border: 2px solid #fff;
        }

        .country-flag img {
            border-radius: 50%;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @media (max-width: 1100px) {

            .hero-title-box h1,
            h1[style*="font-size:60px"],
            h1[style*="font-size:65px"],
            h1[style*="font-size:70px"],
            h1[style*="font-size:75px"] {
                font-size: 44px !important;
            }

            .hero-title-box h1.highlight {
                font-size: 48px !important;
            }

            .section-split.large-split h2,
            h2[style*="font-size:55px"] {
                font-size: 36px !important;
            }

            p[style*="font-size:26px"],
            p[style*="font-size:30px"],
            p[style*="font-size:32px"] {
                font-size: 20px !important;
                line-height: 1.5;
            }

            h1[style*="font-size:280px"] {
                font-size: 160px !important;
            }

            h1 span[style*="font-size:160px"] {
                font-size: 100px !important;
            }

            .large-stat {
                padding: 20px 30px;
            }

            .large-stat h3 {
                font-size: 32px;
            }

            .huge-percent {
                font-size: 120px !important;
            }
        }

        @media (max-width: 991px) {
            .hero-title-box h1 {
                font-size: 38px !important;
            }

            .hero-title-box h1.highlight {
                font-size: 42px !important;
            }

            .section-split.large-split h2 {
                font-size: 30px !important;
            }

            .large-stat {
                padding: 15px 20px;
            }

            .large-stat h3 {
                font-size: 28px !important;
            }

            /* --- Mobile Specific Tweaks --- */

            /* 1. Make images slightly larger */
            .section-split img {
                width: 100% !important;
                max-width: 500px !important;
                transform: scale(1.05);
                /* slightly larger */
            }

            /* 2. Main Hero image: Cut bottom half */
            img[alt="Hero Image"] {
                object-position: top;
                height: 40vh !important;
                object-fit: cover !important;
            }

            /* 3. Removed specific FB override to match WA size perfectly */

            /* 4. Top buttons bigger and clearer */
            .btn-discover,
            .btn-login {
                padding: 12px 25px !important;
                font-size: 18px !important;
                font-weight: 900 !important;
            }

            .cart-icon {
                width: 50px !important;
                height: 50px !important;
                font-size: 22px !important;
            }
        }




        @keyframes pulse-gentle {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }

        .breath-anim {
            animation: pulse-gentle 4s ease-in-out infinite !important;
        }
    </style>


    <script>
        function promptAdmin(e) {
            if (e) e.preventDefault();
            if (window.promptAdmin) {
                window.promptAdmin();
            } else {
                let pass = prompt("بوابة منصة دعاء انور التعليمية للإدارة - الرقم السري:");
                if (pass === "135700") { sessionStorage.setItem('isAdmin', 'yes'); window.location.href = "admin.html"; }
            }
        }

        // Failsafe for UI toggles if script.js is still loading
        window.toggleCountryMenu = window.toggleCountryMenu || function (e) {
            if (e) e.preventDefault();
            const menu = document.getElementById('country-dropdown-main');
            if (menu) {
                const isVisible = menu.style.display === 'block';
                menu.style.display = isVisible ? 'none' : 'block';
            }
        };

        function openCart(e) {
            if (e) e.preventDefault();
            const modal = document.getElementById('cart-modal');
            if (modal) modal.style.display = 'flex';
        }
        window.openCountryModal = window.openCountryModal || function (e) {
            if (e) e.preventDefault();
            const m = document.getElementById('country-modal');
            if (m) m.style.display = 'flex';
            else {
                // Urgent fallback if not injected yet
                alert("جاري تجهيز قائمة الدول... يرجى الانتظار ثانية.");
                if (window.injectCountryModal) window.injectCountryModal();
            }
        };
    </script>
